<header class="custom-header w-100 m-0 p-2">
    <button (click)="toggleTheme()" class="btn-theme-toggle">
        <i class="bi" [class.bi-moon-fill]="!isDark()" [class.bi-sun-fill]="isDark()"></i>
    </button>

    <div class="row g-0 justify-content-between align-items-center m-0 w-100">

        <div class="col-12 col-md-4 align-items-center d-flex justify-content-center">
            <a routerLink="/" class="d-flex align-items-center text-decoration-none">
                <img [src]="isDark() ? '/assets/acnh-dark-logo.png' : '/assets/acnh-light-logo_Nero_AI_Image_Upscaler_Photo.png'"
                    alt="Logo ACNH" width="120">
            </a>
        </div>

        <div class="col-12 col-md-8 justify-content-between">
            <nav class="navbar navbar-expand-md p-0">
                <div class="container-fluid p-0">
                    <div class="collapse navbar-collapse" id="navbarNavDropdown">
                        <ul class="navbar-nav">
                            <li class="nav-item mx-3"><a class="nav-link" [routerLink]="['home']"
                                    routerLinkActive="active">Inicio</a></li>
                            <li class="nav-item mx-3"><a class="nav-link" [routerLink]="['villagers']"
                                    routerLinkActive="active">Aldeanos</a></li>
                            <li class="nav-item dropdown custom-hover-dropdown mx-3" routerLinkActive="active-parent">
                                <span class="nav-link dropdown-toggle" role="button"
                                    data-bs-toggle="dropdown">Coleccionables</span>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" [routerLink]="['bugs']"
                                            routerLinkActive="active">Bichos</a></li>
                                    <li><a class="dropdown-item" [routerLink]="['fishes']"
                                            routerLinkActive="active">Peces</a></li>
                                    <li><a class="dropdown-item" [routerLink]="['seacreatures']"
                                            routerLinkActive="active">Criaturas marinas</a></li>
                                </ul>
                            </li>
                            <li class="nav-item mx-3"><a class="nav-link" href="#">Pricing</a></li>
                        </ul>
                    </div>
                </div>
                <div class="container-fluid justify-content-between d-flex align-items-center">
                    <button class="navbar-toggler me-2 custom-toggler text-white fs-semibold" type="button"
                        data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown">
                        <span class="navbar-toggler-icon "></span>
                </button>
                <button class="btn">Iniciar sesión</button>
                </div>
            </nav>

        </div>
    </div>
</header>
