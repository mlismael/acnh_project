<header class="custom-header w-100">
    <div class="row">
        <div class="col-12 col-lg-10 justify-content-center d-flex align-items-center m-auto">
            <a routerLink="[/]" class="d-flex align-items-center text-decoration-none">
                @if (isDark()) {
                <img src="/assets/acnh-dark-logo.jpeg" alt="Logo ACNH" class="logo bg-transparent" width="200">
                } @else {
                <img src="/assets/acnh-light-logo.jpeg" alt="Logo ACNH" class="logo bg-transparent" width="200">
                }
            </a>

        </div>
        <div class="col-12 col-lg-10">
            <nav class="navbar navbar-expand-lg bg-transparent">
                <div class="container-fluid d-flex align-items-center">

                    <div class="collapse navbar-collapse justify-content-center" id="navbarNavDropdown">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" [routerLink]="['home']" routerLinkActive="active">Inicio</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" [routerLink]="['villagers']" routerLinkActive="active">Aldeanos</a>
                            </li>
                            <li class="nav-item dropdown custom-hover-dropdown" routerLinkActive="active-parent">
                                <span class="nav-link dropdown-toggle" role="button" data-bs-toggle="dropdown">
                                    Coleccionables
                                </span>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" [routerLink]="['bugs']"
                                            routerLinkActive="active">Bichos</a></li>
                                    <li><a class="dropdown-item" [routerLink]="['fishes']"
                                            routerLinkActive="active">Peces</a></li>
                                    <li><a class="dropdown-item" [routerLink]="['seacreatures']"
                                            routerLinkActive="active">Criaturas marinas</a></li>
                                </ul>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Pricing</a>
                            </li>
                        </ul>
                    </div>

                    <div class="ms-auto">
                        <button (click)="toggleTheme()" class="btn-theme-toggle">
                            <i class="bi" [class.bi-moon-fill]="!isDark()" [class.bi-sun-fill]="isDark()"></i>
                        </button>
                    </div>

                    <button class="navbar-toggler ms-2" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNavDropdown">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                </div>
            </nav>
        </div>
    </div>
</header>
